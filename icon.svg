<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#4A90E2" rx="80"/>
  
  <!-- Calendar icon -->
  <g transform="translate(106, 106)">
    <!-- Calendar body -->
    <rect x="0" y="60" width="300" height="240" fill="white" rx="20"/>
    
    <!-- Calendar header -->
    <rect x="0" y="40" width="300" height="80" fill="#ffffff" rx="20"/>
    <rect x="0" y="80" width="300" height="40" fill="#3d7ac5"/>
    
    <!-- Calendar rings -->
    <rect x="60" y="20" width="20" height="60" fill="white" rx="10"/>
    <rect x="220" y="20" width="20" height="60" fill="white" rx="10"/>
    
    <!-- Uterus symbol -->
    <g transform="translate(150, 175)" fill="#4A90E2" stroke="#4A90E2" stroke-width="2">
      <!-- Left fallopian tube -->
      <path d="M -45,-15 Q -55,-25 -60,-15 Q -55,-5 -45,-5" fill="#4A90E2"/>
      <circle cx="-60" cy="-15" r="8" fill="#4A90E2"/>
      
      <!-- Right fallopian tube -->
      <path d="M 45,-15 Q 55,-25 60,-15 Q 55,-5 45,-5" fill="#4A90E2"/>
      <circle cx="60" cy="-15" r="8" fill="#4A90E2"/>
      
      <!-- Uterus body (inverted triangle/trapezoid shape) -->
      <path d="M -40,-10 L 40,-10 L 25,40 Q 0,50 -25,40 Z" fill="#4A90E2"/>
      
      <!-- Cervix -->
      <rect x="-8" y="40" width="16" height="20" rx="4" fill="#4A90E2"/>
    </g>
  </g>
</svg>
